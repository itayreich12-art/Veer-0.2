<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>AI Travel Planner</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f9;
            text-align: center;
            padding: 50px;
        }
        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            max-width: 600px;
            margin: auto;
        }
        input {
            padding: 10px;
            width: 70%;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        button {
            padding: 10px 20px;
            margin-top: 10px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #results {
            margin-top: 30px;
            text-align: right;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>✈️ מתכנן טיולים חכם</h1>
    <input type="text" id="destination" placeholder="לאן תרצו לטוס?">
    <br>
    <button onclick="getTravelInfo()">תכנן לי טיול</button>

    <div id="results"></div>
</div>

<script>
function getTravelInfo() {
    const dest = document.getElementById("destination").value;
    const results = document.getElementById("results");

    if (!dest) {
        results.innerHTML = "❗ נא להכניס יעד";
        return;
    }

    results.innerHTML = "🔍 מחפש מידע...";

    setTimeout(() => {
        results.innerHTML = `
            <h3>📍 יעד: ${dest}</h3>
            <p><b>⏳ זמן טיסה:</b> משתנה לפי מוצא</p>
            <p><b>🗣️ שפה:</b> תלוי במדינה</p>
            <p><b>🌟 אטרקציות:</b> אוכל, תרבות, טבע ואטרקציות מקומיות</p>
        `;
    }, 1200);
}
</script>

</body>
</html>
