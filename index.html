<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veer AI Travel Planner ✈️</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color: white;
  min-height: 100vh;
  padding: 20px;
}

.container {
  max-width: 1200px;
  margin: auto;
}

.hero {
  text-align: center;
  margin-bottom: 40px;
}

.hero h1 {
  font-size: 3rem;
  margin-bottom: 10px;
}

.hero p {
  opacity: 0.9;
  font-size: 1.2rem;
}

.card {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 30px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.3);
  margin-bottom: 30px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
  gap: 20px;
}

label {
  display: block;
  margin-bottom: 10px;
  font-weight: bold;
}

input, select {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 16px;
  margin-top: 25px;
  border: none;
  border-radius: 14px;
  background: linear-gradient(90deg,#00c6ff,#0072ff);
  color: white;
  font-size: 18px;
  cursor: pointer;
  font-weight: bold;
}

button:hover {
  transform: scale(1.02);
}

.results {
  display: none;
}

.section {
  background: rgba(255,255,255,0.08);
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 20px;
}

.section h2 {
  color: #ffd369;
  margin-bottom: 15px;
}

ul {
  padding-right: 20px;
  line-height: 2;
}

.footer {
  text-align: center;
  opacity: 0.8;
  margin-top: 40px;
}

@media(max-width:700px){
  .hero h1 {
    font-size: 2rem;
  }
}
</style>
</head>
<body>

<div class="container">

<div class="hero">
<h1>✈️ Veer AI Travel Planner</h1>
<p>מתכנן הטיולים החכם שלך</p>
</div>

<div class="card">
<div class="grid">

<div>
<label>🌍 יעד</label>
<input type="text" id="destination" placeholder="יפן, פריז, לונדון, ניו יורק...">
</div>

<div>
<label>📅 מספר ימים</label>
<input type="number" id="days" placeholder="7">
</div>

<div>
<label>💰 תקציב</label>
<select id="budget">
<option>נמוך</option>
<option>בינוני</option>
<option>גבוה</option>
<option>יוקרתי</option>
</select>
</div>

<div>
<label>🎒 סוג טיול</label>
<select id="style">
<option>משפחתי</option>
<option>זוגי</option>
<option>תרמילאים</option>
<option>יוקרתי</option>
<option>עסקים</option>
</select>
</div>

</div>

<button onclick="planTrip()">✨ תכנן לי טיול</button>
</div>

<div class="results" id="results">

<div class="section">
<h2>📍 מידע כללי</h2>
<div id="general"></div>
</div>

<div class="section">
<h2>🗣️ שפה ומטבע</h2>
<div id="language"></div>
</div>

<div class="section">
<h2>🌟 אטרקציות מובילות</h2>
<div id="attractions"></div>
</div>

<div class="section">
<h2>🍜 אוכל מקומי</h2>
<div id="food"></div>
</div>

<div class="section">
<h2>🧳 טיפים לטיול</h2>
<div id="tips"></div>
</div>

</div>

<div class="footer">
<p>Made with ❤️ using Veer AI</p>
</div>

</div>

<script>

const destinations = {
  "יפן": {
    language: "יפנית",
    currency: "ין יפני",
    flight: "כ-11 שעות מתל אביב",
    attractions: [
      "טוקיו דיסנילנד",
      "טוקיו דיסני סי",
      "מגדל טוקיו",
      "שיבויה קרוסינג",
      "אקיהברה",
      "מקדש סנסו-ג'י",
      "הר פוג'י",
      "קיוטו",
      "מקדש הזהב קינקאקוג'י",
      "פארק נארה",
      "טירת אוסקה",
      "אולפני יוניברסל אוסקה",
      "הירושימה",
      "יער הבמבוק אראשיאמה"
    ],
    food: ["סושי","ראמן","טמפורה","יאקיטורי","מוצ'י"],
    tips: [
      "להחזיק כסף מזומן",
      "ללמוד כמה מילים בסיסיות ביפנית",
      "לא לדבר בקול ברכבת",
      "להגיע בעונת האביב לפריחת הדובדבן"
    ]
  },

  "פריז": {
    language: "צרפתית",
    currency: "אירו",
    flight: "כ-5 שעות מתל אביב",
    attractions: [
      "מגדל אייפל",
      "מוזיאון הלובר",
      "שער הניצחון",
      "שאנז אליזה",
      "דיסנילנד פריז",
      "נהר הסן",
      "קתדרלת נוטרדאם",
      "מונמארטר",
      "ארמון ורסאי",
      "מוזיאון ד'אורסה",
      "מולן רוז'",
      "גני טווילרי"
    ],
    food: ["קרואסון","באגט","מקרונים","גבינות צרפתיות"],
    tips: [
      "להיזהר מכייסים",
      "לקנות כרטיס מטרו שבועי",
      "לבקר בלילה במגדל אייפל"
    ]
  },

  "לונדון": {
    language: "אנגלית",
    currency: "לירה שטרלינג",
    flight: "כ-5.5 שעות מתל אביב",
    attractions: [
      "ביג בן",
      "ארמון בקינגהאם",
      "לונדון איי",
      "מוזיאון בריטי",
      "טאואר ברידג'",
      "אולפני הארי פוטר",
      "הייד פארק",
      "כיכר פיקדילי",
      "קמדן מרקט",
      "מוזיאון השעווה מאדאם טוסו",
      "אוקספורד סטריט",
      "קתדרלת סנט פול"
    ],
    food: ["פיש אנד צ'יפס","תה אנגלי","פאי בשר"],
    tips: [
      "להביא מטרייה",
      "להשתמש בכרטיס Oyster",
      "לבקר במוזיאונים החינמיים"
    ]
  },

  "ניו יורק": {
    language: "אנגלית",
    currency: "דולר אמריקאי",
    flight: "כ-11 שעות מתל אביב",
    attractions: [
      "טיימס סקוור",
      "סנטרל פארק",
      "פסל החירות",
      "ברוקלין ברידג'",
      "אמפייר סטייט בילדינג",
      "ברודוויי",
      "השדרה החמישית",
      "וול סטריט",
      "מוזיאון המטרופוליטן",
      "רוקפלר סנטר",
      "היי ליין",
      "גרנד סנטרל"
    ],
    food: ["פיצה ניו יורקית","בייגל","צ'יזקייק"],
    tips: [
      "להשתמש בסאבווי",
      "להזמין כרטיסים לברודווי מראש",
      "להיזהר מאזורים מסוימים בלילה"
    ]
  },

  "רומא": {
    language: "איטלקית",
    currency: "אירו",
    flight: "כ-4 שעות מתל אביב",
    attractions: [
      "הקולוסיאום",
      "הוותיקן",
      "מזרקת טרווי",
      "הפנתאון",
      "המדרגות הספרדיות",
      "פורום רומאנום",
      "טירת סנטאנג'לו",
      "פיאצה נאבונה",
      "וילה בורגזה",
      "קמפו די פיורי"
    ],
    food: ["פיצה","פסטה","גלידה איטלקית","טירמיסו"],
    tips: [
      "להזמין כרטיסים לאטרקציות מראש",
      "ללבוש נעליים נוחות",
      "לאכול במסעדות מקומיות קטנות"
    ]
  }
};

function planTrip() {

  const destination = document.getElementById("destination").value.trim();
  const days = document.getElementById("days").value;
  const budget = document.getElementById("budget").value;
  const style = document.getElementById("style").value;

  const data = destinations[destination];

  if (!data) {
    alert("כרגע יש מידע רק על: יפן, פריז, לונדון, ניו יורק ורומא");
    return;
  }

  document.getElementById("results").style.display = "block";

  document.getElementById("general").innerHTML = `
  <p><b>🌍 יעד:</b> ${destination}</p>
  <p><b>📅 מספר ימים:</b> ${days}</p>
  <p><b>💰 תקציב:</b> ${budget}</p>
  <p><b>🎒 סוג טיול:</b> ${style}</p>
  <p><b>✈️ זמן טיסה מתל אביב:</b> ${data.flight}</p>
  `;

  document.getElementById("language").innerHTML = `
  <p><b>🗣️ שפה:</b> ${data.language}</p>
  <p><b>💵 מטבע:</b> ${data.currency}</p>
  `;

  document.getElementById("attractions").innerHTML = `
  <ul>
    ${data.attractions.map(item => `<li>⭐ ${item}</li>`).join("")}
  </ul>
  `;

  document.getElementById("food").innerHTML = `
  <ul>
    ${data.food.map(item => `<li>🍜 ${item}</li>`).join("")}
  </ul>
  `;

  document.getElementById("tips").innerHTML = `
  <ul>
    ${data.tips.map(item => `<li>🧳 ${item}</li>`).join("")}
  </ul>
  `;

  window.scrollTo({
    top: document.body.scrollHeight,
    behavior: "smooth"
  });
}

</script>

</body>
</html>
